services:
  postgres:
    image: postgres:18
    container_name: cs-capstone-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cs_capstone
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: